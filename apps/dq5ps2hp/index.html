<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ドラクエ5(PS2版) HP確率計算ツール[ver2.2]</title>
    <!-- PWA用の設定を追加 -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --primary: #06b6d4; /* 初期表示（男の子）の水色 */
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text: #2d3748;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            overscroll-behavior: none;
            overflow-y: auto;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 10px;
            color: #1a202c;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 2px;
            color: #718096;
        }

        .label-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 24px;
        }

        .lv-highlight {
            font-size: 1.25rem;
            font-weight: 900;
            margin: 0 2px;
            vertical-align: middle;
        }

        select, input {
            padding: 6px 8px;
            font-size: 0.9rem;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            outline: none;
            background: #fff;
            width: 100%;
            -webkit-appearance: none;
        }

        select:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .char-btn-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding-bottom: 4px;
        }

        .char-btn {
            flex: 1 0 calc(33.333% - 6px);
            padding: 6px 4px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 2px solid #cbd5e0;
            border-radius: 20px;
            background: #fff;
            color: #4a5568;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .range-slider-container {
            position: relative;
            width: 100%;
            height: 24px;
            margin-top: 4px;
            margin-bottom: 4px;
        }

        .range-slider-container input[type="range"] {
            position: absolute;
            width: 100%;
            pointer-events: none;
            -webkit-appearance: none;
            appearance: none;
            background: none;
            height: 100%;
            margin: 0;
            top: 0;
            left: 0;
            z-index: 2;
        }

        .range-slider-container input[type="range"]::-webkit-slider-thumb {
            height: 22px;
            width: 22px;
            border-radius: 50%;
            background: var(--primary);
            pointer-events: auto;
            -webkit-appearance: none;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        .range-slider-container input[type="range"]::-moz-range-thumb {
            height: 22px;
            width: 22px;
            border-radius: 50%;
            background: var(--primary);
            pointer-events: auto;
            cursor: pointer;
            border: none;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        .slider-track {
            position: absolute;
            height: 6px;
            width: calc(100% - 22px);
            left: 11px;
            background: #e2e8f0;
            border-radius: 3px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }

        .matrix-container {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #fff;
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .matrix-container table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            text-align: center;
            table-layout: fixed;
        }

        .matrix-container th, .matrix-container td {
            padding: 8px 2px;
            border: 1px solid #edf2f7;
            height: 40px;
            width: 25%;
            word-break: break-all;
        }

        .matrix-container th {
            background: #edf2f7;
            font-weight: bold;
            color: #4a5568;
        }

        .center-header {
            background: var(--primary) !important;
            color: #fff !important;
        }

        .center-cell {
            font-weight: bold;
            color: var(--primary);
            background-color: rgba(0, 0, 0, 0.01);
        }

        .footer {
            margin-top: 12px;
            font-size: 0.7rem;
            color: #718096;
            text-align: center;
            line-height: 1.4;
        }

        .footer a {
            color: #4a5568;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ドラクエ5(PS2版) HP確率計算ツール[ver2.2]</h1>

    <div class="grid">
        <!-- キャラクター選択 (ボタン形式) -->
        <div class="form-group full-width">
            <label>キャラクター</label>
            <div class="char-btn-container" id="charBtnContainer"></div>
        </div>

        <!-- レベル範囲スライダー (2本つまみ) -->
        <div class="form-group full-width">
            <div class="label-flex">
                <label id="lvRangeTitle" style="color: var(--primary); font-weight: bold;"></label>
            </div>
            <div class="range-slider-container">
                <div class="slider-track" id="sliderTrack"></div>
                <input type="range" id="startLv" min="1" max="30" value="5" oninput="controlStartSlider()">
                <input type="range" id="endLv" min="1" max="30" value="27" oninput="controlEndSlider()">
            </div>
        </div>

        <!-- 開始HP -->
        <div class="form-group">
            <label for="startHp">開始HP</label>
            <select id="startHp" onchange="onStartHpChange()"></select>
        </div>

        <!-- 目標HP -->
        <div class="form-group">
            <label for="targetHp">目標HP（未満になる確率が下表）</label>
            <select id="targetHp" onchange="onTargetHpChange()"></select>
        </div>
    </div>

    <!-- 21マスの確率マトリックス表を出力するコンテナ -->
    <div class="matrix-container" id="matrixContainer"></div>

    <!-- 指定されたフッター行 -->
    <div class="footer">
        制作：右弐 / <a href="https://x.com/uniright2" target="_blank" rel="noopener">https://x.com/uniright2</a><br>
        調査と仮説：<a href="https://uniright2.github.io/ancient/dq5/" target="_blank" rel="noopener">https://uniright2.github.io/ancient/dq5/</a>
    </div>
</div>

<script>
// ==========================================
// 1. 確率パターンの定義
// ==========================================
const growthPatterns = {
    0:  { 0: 1 },
    1:  { 1: 1 }, 
    2:  { 2: 1 }, 
    3:  { 2: 1/6, 3: 4/6, 4: 1/6 },
    4:  { 3: 2/8, 4: 4/8, 5: 2/8 },
    5:  { 4: 3/10, 5: 4/10, 6: 3/10 },
    6:  { 5: 4/12, 6: 4/12, 7: 4/12 },
    7:  { 5: 1/14, 6: 4/14, 7: 4/14, 8: 4/14, 9: 1/14 },
    8:  { 6: 2/16, 7: 4/16, 8: 4/16, 9: 4/16, 10: 2/16 },
    9:  { 7: 3/18, 8: 4/18, 9: 4/18, 10: 4/18, 11: 3/18 },
    10: { 8: 4/20, 9: 4/20, 10: 4/20, 11: 4/20, 12: 4/20 },
    11: { 8: 1/22, 9: 4/22, 10: 4/22, 11: 4/22, 12: 4/22, 13: 4/22, 14: 1/22 },
    12: { 9: 2/24, 10: 4/24, 11: 4/24, 12: 4/24, 13: 4/24, 14: 4/24, 15: 2/24 },
    13: { 10: 3/26, 11: 4/26, 12: 4/26, 13: 4/26, 14: 4/26, 15: 4/26, 16: 3/26 },
    'nuts': { 4: 1/3, 5: 1/3, 6: 1/3 }
};

const patternBounds = {};
for (let id in growthPatterns) {
    const gains = Object.keys(growthPatterns[id]).map(Number);
    patternBounds[id] = { min: Math.min(...gains), max: Math.max(...gains) };
}

// ==========================================
// 2. キャラクター別の基本データ
// ==========================================
const charNames = ["主人公", "ピエール", "アプール", "男の子", "女の子", "サンチョ"];

const charInitialHp = {
    "主人公": 24, "アプール": 90, "ピエール": 40, "男の子": 74, "女の子": 67, "サンチョ": 214
};

const charLvBounds = {
    "主人公":   { min: 1,  max: 30 },
    "アプール": { min: 1,  max: 20 },
    "ピエール": { min: 1,  max: 30 },
    "男の子":   { min: 5,  max: 30 },
    "女の子":   { min: 5,  max: 30 },
    "サンチョ": { min: 20, max: 30 }
};

const charThemes = {
    "主人公":   { primary: "#8b5cf6", bg: "linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%)", border: "#d8b4fe", text: "#6b21a8" }, 
    "アプール": { primary: "#f97316", bg: "linear-gradient(135deg, #ffedd5 0%, #fed7aa 100%)", border: "#fdba74", text: "#9a3412" }, 
    "ピエール": { primary: "#10b981", bg: "linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%)", border: "#6ee7b7", text: "#065f46" }, 
    "男の子":   { primary: "#06b6d4", bg: "linear-gradient(135deg, #ecfeff 0%, #cffafe 100%)", border: "#67e8f9", text: "#075985" }, 
    "女の子":   { primary: "#ec4899", bg: "linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%)", border: "#f472b6", text: "#9d174d" }, 
    "サンチョ": { primary: "#78350f", bg: "linear-gradient(135deg, #fef3c7 0%, #fde68a 100%)", border: "#fcd34d", text: "#78350f" }  
};

// 新設：キャラクターごとの独立した選択状況を保存するメモリ
let charStates = {
    "主人公":   { startLv: 1,  endLv: 27, startHp: null, targetHp: 216 },
    "ピエール": { startLv: 1,  endLv: 27, startHp: null, targetHp: 216 },
    "アプール": { startLv: 1,  endLv: 20, startHp: null, targetHp: 216 },
    "男の子":   { startLv: 5,  endLv: 27, startHp: null, targetHp: 216 },
    "女の子":   { startLv: 5,  endLv: 27, startHp: null, targetHp: 216 },
    "サンチョ": { startLv: 20, endLv: 27, startHp: null, targetHp: 216 }
};

const characterGrowthSettings = {
    "主人公": {
        1: 4, 2: 4, 3: 4, 4: 4, 5: 7, 6: 7, 7: 7, 8: 7, 9: 8, 10: 8,
        11: 8, 12: 8, 13: 8, 14: 8, 15: 8, 16: 8, 17: 8, 18: 8, 19: 8, 20: 8,
        21: 8, 22: 8, 23: 8, 24: 8, 25: 8, 26: 8, 27: 8, 28: 8, 29: 8
    },
    "アプール": {
        1: 2, 2: 2, 3: 2, 4: 2, 5: 2, 6: 2, 7: 2, 8: 2, 9: 2, 10: 2,
        11: 2, 12: 2, 13: 2, 14: 13, 15: 6, 16: 12, 17: 5, 18: 8, 19: 8
    },
    "ピエール": {
        1: 6, 2: 6, 3: 6, 4: 6, 5: 4, 6: 4, 7: 4, 8: 4, 9: 5, 10: 9,
        11: 10, 12: 10, 13: 10, 14: 10, 15: 5, 16: 5, 17: 5, 18: 5, 19: 6, 20: 9,
        21: 9, 22: 9, 23: 9, 24: 9, 25: 9, 26: 9, 27: 9, 28: 9, 29: 9
    },
    "男の子": {
        5: 8, 6: 9, 7: 9, 8: 9, 9: 9, 10: 2, 11: 2, 12: 3, 13: 2, 14: 3,
        15: 10, 16: 10, 17: 10, 18: 10, 19: 10, 20: 2, 21: 3, 22: 2, 23: 3, 24: 2,
        25: 3, 26: 2, 27: 3, 28: 2, 29: 3
    },
    "女の子": {
        5: 5, 6: 5, 7: 6, 8: 5, 9: 6, 10: 6, 11: 7, 12: 6, 13: 7, 14: 7,
        15: 11, 16: 12, 17: 11, 18: 12, 19: 12, 20: 2, 21: 3, 22: 3, 23: 2, 24: 3,
        25: 3, 26: 2, 27: 3, 28: 3, 29: 3
    },
    "サンチョ": {
        20: 11, 21: 12, 22: 12, 23: 12, 24: 12, 25: 12, 26: 11, 27: 12, 28: 12, 29: 12
    }
};

let selectedChar = "男の子";

// ==========================================
// 4. UIの初期化処理
// ==========================================
function init() {
    const btnContainer = document.getElementById('charBtnContainer');
    charNames.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'char-btn';
        btn.id = `btn-${name}`;
        btn.textContent = name;
        btn.onclick = () => selectCharacter(name);
        btnContainer.appendChild(btn);
    });

    const targetHpSelect = document.getElementById('targetHp');
    for (let hp = 24; hp <= 333; hp++) {
        let opt = document.createElement('option');
        opt.value = hp;
        opt.textContent = hp;
        targetHpSelect.appendChild(opt);
    }

    selectCharacter(selectedChar);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => {
            console.log('Service Worker Registered');
        });
    }
}

// 変更点：キャラクター切り替え時に、そのキャラ専用の保存値をUIへ復元
function selectCharacter(name) {
    selectedChar = name;
    
    charNames.forEach(cName => {
        const btn = document.getElementById(`btn-${cName}`);
        const theme = charThemes[cName];
        if (cName === selectedChar) {
            btn.style.background = theme.primary;
            btn.style.color = "#fff";
            btn.style.borderColor = theme.primary;
        } else {
            btn.style.background = "#fff";
            btn.style.color = "#4a5568";
            btn.style.borderColor = "#cbd5e0";
        }
    });

    const bounds = charLvBounds[selectedChar];
    const startLvInput = document.getElementById('startLv');
    const endLvInput = document.getElementById('endLv');

    startLvInput.min = bounds.min;
    startLvInput.max = bounds.max;
    endLvInput.min = bounds.min;
    endLvInput.max = bounds.max;

    // 保存されている各ステータスをUIにロード
    const state = charStates[selectedChar];
    startLvInput.value = state.startLv;
    endLvInput.value = state.endLv;
    document.getElementById('targetHp').value = state.targetHp;

    updateSliderUI();
}

// ==========================================
// 5. スライダー制御・データ保存連動
// ==========================================
function controlStartSlider() {
    const startLv = document.getElementById('startLv');
    const endLv = document.getElementById('endLv');
    if (parseInt(startLv.value) > parseInt(endLv.value)) {
        startLv.value = endLv.value;
    }
    // 現在のキャラクターの値を保存
    charStates[selectedChar].startLv = parseInt(startLv.value);
    updateSliderUI();
}

function controlEndSlider() {
    const startLv = document.getElementById('startLv');
    const endLv = document.getElementById('endLv');
    if (parseInt(endLv.value) < parseInt(startLv.value)) {
        endLv.value = startLv.value;
    }
    // 現在のキャラクターの値を保存
    charStates[selectedChar].endLv = parseInt(endLv.value);
    updateSliderUI();
}

function updateSliderUI() {
    const startLv = charStates[selectedChar].startLv;
    const endLv = charStates[selectedChar].endLv;
    
    document.getElementById('lvRangeTitle').innerHTML = `レベルアップ Lv <span class="lv-highlight">${startLv}</span> → Lv <span class="lv-highlight">${endLv}</span>`;

    const theme = charThemes[selectedChar];
    document.documentElement.style.setProperty('--primary', theme.primary);

    const bounds = charLvBounds[selectedChar];
    const totalRange = bounds.max - bounds.min;
    
    const p1 = totalRange > 0 ? ((startLv - bounds.min) / totalRange) * 100 : 0;
    const p2 = totalRange > 0 ? ((endLv - bounds.min) / totalRange) * 100 : 100;
    
    const track = document.getElementById('sliderTrack');
    track.style.background = `linear-gradient(to right, #e2e8f0 ${p1}%, var(--primary) ${p1}%, var(--primary) ${p2}%, #e2e8f0 ${p2}%)`;

    updateStartHpOptions();
}

// ==========================================
// 6. 開始HPの動的生成・保存値の維持
// ==========================================
function updateStartHpOptions() {
    const startLv = charStates[selectedChar].startLv;
    const startHpSelect = document.getElementById('startHp');
    const bounds = charLvBounds[selectedChar];

    let minHp = charInitialHp[selectedChar];
    let maxHp = charInitialHp[selectedChar];

    for (let lv = bounds.min; lv < startLv; lv++) {
        const patternId = characterGrowthSettings[selectedChar][lv];
        if (patternBounds[patternId]) {
            minHp += patternBounds[patternId].min;
            maxHp += patternBounds[patternId].max;
        }
    }

    const midHp = Math.round((minHp + maxHp) / 2);
    const allowedMaxHp = maxHp + 36; 

    startHpSelect.innerHTML = "";
    const savedHp = charStates[selectedChar].startHp;
    let hasSavedHp = false;

    for (let hp = minHp; hp <= allowedMaxHp; hp++) {
        let opt = document.createElement('option');
        opt.value = hp; opt.textContent = hp;
        // 以前保存した値が今回のレベル範囲に存在すればそれを選択
        if (savedHp !== null && hp === savedHp) {
            opt.selected = true;
            hasSavedHp = true;
        }
        startHpSelect.appendChild(opt);
    }

    // 保存データがない、またはレベル変更により範囲外になった場合は中央値で自動補正
    if (!hasSavedHp) {
        startHpSelect.value = midHp;
        charStates[selectedChar].startHp = midHp;
    }

    calculate();
}

// 変更点：ドロップダウン変更を検知して記憶に書き込む関数
function onStartHpChange() {
    charStates[selectedChar].startHp = parseInt(document.getElementById('startHp').value);
    calculate();
}

function onTargetHpChange() {
    charStates[selectedChar].targetHp = parseInt(document.getElementById('targetHp').value);
    calculate();
}

// ==========================================
// 7. 確率計算ロジック（畳み込み）
// ==========================================
function convolve(dist, pattern) {
    let nextDist = {};
    for (let hpStr in dist) {
        let hp = parseInt(hpStr);
        let p1 = dist[hpStr];
        for (let gainStr in pattern) {
            let gain = parseInt(gainStr);
            let p2 = pattern[gainStr];
            let nextHp = hp + gain;
            nextDist[nextHp] = (nextDist[nextHp] || 0) + (p1 * p2);
        }
    }
    return nextDist;
}

function calculate() {
    const startLv = charStates[selectedChar].startLv;
    const targetEndLv = charStates[selectedChar].endLv;
    const startHp = charStates[selectedChar].startHp;
    const targetHp = charStates[selectedChar].targetHp;

    if (startHp === null || isNaN(startHp) || isNaN(targetHp)) return;

    const bounds = charLvBounds[selectedChar];
    const endLvs = [targetEndLv - 1, targetEndLv, targetEndLv + 1];

    let baseDists = [];
    endLvs.forEach(lv => {
        if (lv < bounds.min || lv > bounds.max || lv < startLv) {
            baseDists.push({ lv: lv, valid: false });
            return;
        }
        
        let currentDist = { [startHp]: 1.0 };
        for (let l = startLv; l < lv; l++) {
            const patternId = characterGrowthSettings[selectedChar][l];
            const pattern = growthPatterns[patternId];
            if (pattern) currentDist = convolve(currentDist, pattern);
        }
        baseDists.push({ lv: lv, dist: currentDist, valid: true });
    });

    let matrixHtml = `<table><thead><tr><th>命の木の実</th>`;
    endLvs.forEach((lv, idx) => {
        const isCenter = (idx === 1); 
        const headerClass = isCenter ? ' class="center-header"' : '';
        const rangeText = baseDists[idx].valid ? '' : '<br><span style="font-size:0.6rem;font-weight:normal;">(範囲外)</span>';
        matrixHtml += `<th${headerClass}>Lv ${lv}${rangeText}</th>`;
    });
    matrixHtml += `</tr></thead><tbody>`;

    const nutsPattern = growthPatterns['nuts'];

    for (let nuts = 0; nuts <= 6; nuts++) {
        matrixHtml += `<tr><td style="font-weight: bold; background: #f8fafc;">${nuts}個追加</td>`;
        
        for (let idx = 0; idx < 3; idx++) {
            const cellInfo = baseDists[idx];
            const isCenter = (idx === 1);
            const cellClass = isCenter ? ' class="center-cell"' : '';
            
            if (!cellInfo.valid) {
                matrixHtml += `<td${cellClass}>-</td>`;
                continue;
            }
            
            let nutsDist = { ...cellInfo.dist };
            for (let i = 0; i < nuts; i++) {
                nutsDist = convolve(nutsDist, nutsPattern);
            }
            
            let lessProb = 0;
            for (let hpStr in nutsDist) {
                if (parseInt(hpStr) < targetHp) {
                    lessProb += nutsDist[hpStr];
                }
            }
            
            if (lessProb > 1.0) lessProb = 1.0;
            if (lessProb < 0) lessProb = 0;
            
            const probStr = (lessProb * 100).toFixed(2) + "%";
            matrixHtml += `<td${cellClass}>${probStr}</td>`;
        }
        matrixHtml += `</tr>`;
    }
    matrixHtml += `</tbody></table>`;

    document.getElementById('matrixContainer').innerHTML = matrixHtml;
}

window.onload = init;
</script>
</body>
</html>
